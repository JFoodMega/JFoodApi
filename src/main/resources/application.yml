server:
  port: 8080

spring:
  application:
    name: foodorder

  datasource:
    url: jdbc:postgresql://localhost:5432/main_db
    username: main_user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: v9y$B&E)H@McQfTjWnZr4u7x!A%C*F-JaNdRgUkXp2s5v8y/B?E(G+KbPeShVmYq
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

upload:
  path: ./uploads
  base-url: http://localhost:8080/uploads

cors:
  allowed-origins: "http://localhost:3000,http://localhost:8081"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"
  allow-credentials: true

