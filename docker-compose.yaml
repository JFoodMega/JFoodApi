version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: jfood-postgres
    environment:
      POSTGRES_DB: main_db
      POSTGRES_USER: main_user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U main_user -d main_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: jfood-app
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/main_db
      SPRING_DATASOURCE_USERNAME: main_user
      SPRING_DATASOURCE_PASSWORD: password
